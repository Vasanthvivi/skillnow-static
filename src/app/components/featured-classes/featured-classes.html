<section class="featured-classes" id="courses">
  <div class="container">
    <div class="section-header">
      <h2><span class="italic">Featured</span> Developer<br>Classes</h2>
      <p>Li Europan lingues es membres del sam familie. Lor separat existentie es un myth. Por scientie, musica, sport etc.</p>
    </div>
    <div class="classes-grid">
      @for (course of courses; track course.name) {
        <div class="class-card">
          <div class="class-image">
            <img [src]="course.image" [alt]="course.name">
          </div>
          <div class="class-name">{{ course.name }}</div>
        </div>
      }
    </div>
  </div>
</section>
