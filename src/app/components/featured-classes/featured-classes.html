<section class="featured-classes" id="courses">
  <div class="container">
    <div class="section-header">
      <h2><span class="italic">Fetured</span> Web Developer<br>Classes</h2>
      <p>Li Europan lingues es membres del sam familie. Lor separat existentie es un myth. Por scientie, musica, sport etc.</p>
    </div>
    <div class="classes-grid">
      @for (cls of classes; track cls.title) {
        <div class="class-card">
          <div class="class-image">
            <img [src]="cls.image" [alt]="cls.title">
          </div>
          <button class="class-btn" [class]="cls.btnClass">{{ cls.label }}</button>
        </div>
      }
    </div>
  </div>
</section>
