<nav class="navbar">
  <div class="container nav-container">
    <a routerLink="/" class="logo" aria-label="Auralis Institute">
      <span class="logo-main">Auralis</span>
      <span class="logo-divider"></span>
      <span class="logo-accent">Institute</span>
    </a>
    <ul class="nav-links" [class.open]="menuOpen">
      <li>
        <a
          routerLink="/"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="menuOpen = false"
          >Home</a>
      </li>
      <li>
        <a routerLink="/about" routerLinkActive="active" (click)="menuOpen = false">About Us</a>
      </li>
      <li>
        <a routerLink="/courses" routerLinkActive="active" (click)="menuOpen = false">Course</a>
      </li>
      <li>
        <a routerLink="/contact" routerLinkActive="active" (click)="menuOpen = false">Contact Us</a>
      </li>
    </ul>
    <button class="mobile-menu-btn" (click)="toggleMenu()">
      <i class="fas" [class.fa-bars]="!menuOpen" [class.fa-times]="menuOpen"></i>
    </button>
  </div>
</nav>
