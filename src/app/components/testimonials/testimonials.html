<section class="testimonials" id="testimonials">
  <div class="container">
    <div class="section-header">
      <h2><span class="italic">Testimonials</span></h2>
      <p>See what our students say about their learning experience and how our courses helped them grow.</p>
    </div>
    <div class="testimonials-grid">
      @for (testimonial of testimonials; track testimonial.name) {
        <div class="testimonial-card">
          <div class="testimonial-avatar">
            <div class="avatar-circle" [style.background]="testimonial.avatarBg">
              <i class="fas fa-user"></i>
            </div>
            <div class="testimonial-info">
              <h4>{{ testimonial.name }}</h4>
            </div>
          </div>
          <p class="testimonial-text">"{{ testimonial.text }}"</p>
          <div class="stars">
            @for (star of [1,2,3,4,5]; track star) {
              <i class="fas fa-star"></i>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
